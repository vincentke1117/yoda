AWSTemplateFormatVersion: '2010-09-09'
Description: Bootstrap resources used to publish and provision Yoda Relay.

Resources:
  RelayRepository:
    Type: AWS::ECR::Repository
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      RepositoryName: yoda-relay
      ImageTagMutability: IMMUTABLE
      ImageScanningConfiguration:
        ScanOnPush: true
      EncryptionConfiguration:
        EncryptionType: AES256
      LifecyclePolicy:
        LifecyclePolicyText: >-
          {"rules":[{"rulePriority":1,"description":"Keep the latest 20 Relay images","selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":20},"action":{"type":"expire"}}]}
      Tags:
        - Key: Application
          Value: yoda-relay
        - Key: Environment
          Value: production

  RelayProvisionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: YodaRelayProvisionRole
      Description: Non-root role used only to provision and release Yoda Relay.
      MaxSessionDuration: 7200
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:root
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/PowerUserAccess
      Policies:
        - PolicyName: ManageYodaRelayRuntimeRoles
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:GetRole
                  - iam:TagRole
                  - iam:UntagRole
                  - iam:UpdateAssumeRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRolePolicy
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:ListRolePolicies
                  - iam:ListAttachedRolePolicies
                  - iam:CreateInstanceProfile
                  - iam:DeleteInstanceProfile
                  - iam:GetInstanceProfile
                  - iam:AddRoleToInstanceProfile
                  - iam:RemoveRoleFromInstanceProfile
                  - iam:TagInstanceProfile
                  - iam:PassRole
                Resource:
                  - !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:role/YodaRelayRuntimeRole
                  - !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:instance-profile/YodaRelayRuntimeProfile
              - Effect: Allow
                Action: iam:CreateServiceLinkedRole
                Resource: '*'
                Condition:
                  StringEquals:
                    iam:AWSServiceName:
                      - spot.amazonaws.com
                      - spotfleet.amazonaws.com

Outputs:
  RepositoryUri:
    Value: !GetAtt RelayRepository.RepositoryUri
  ProvisionRoleArn:
    Value: !GetAtt RelayProvisionRole.Arn
