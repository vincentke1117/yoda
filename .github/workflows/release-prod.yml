name: Release (Production)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v0.13.10)'
        required: true
      arch:
        description: 'Architecture to build (arm64 | x64 | both)'
        required: false
        default: 'both'
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  # 先创建 draft release，三个平台 job 把资产传齐后再由 publish-release 发布。
  # 否则 release 一创建 `releases/latest/download` 就指向它，而 mac 的
  # v1-stable-mac.yml 要十几分钟后才传上去，期间所有 mac 用户的更新检查
  # 都会 404（ERR_UPDATER_CHANNEL_FILE_NOT_FOUND）。draft 对 latest 不可见。
  create-release:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Prepare release notes
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"
          if [ -f CHANGELOG.md ]; then
            awk -v ver="$VERSION" '
              /^## / { if (found) exit; if ($2 == ver) { found=1; next } }
              found { print }
            ' CHANGELOG.md > release-notes.md || true
          fi
          if [ ! -s release-notes.md ]; then
            printf 'Release v%s\n' "$VERSION" > release-notes.md
          fi

      - name: Create draft release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" -R "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists, skipping create"
          else
            gh release create "$RELEASE_TAG" -R "$GITHUB_REPOSITORY" \
              --draft --title "$RELEASE_TAG" --notes-file release-notes.md
          fi

  release-linux:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    environment: release
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}
      - name: Install system build dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential pkg-config libsecret-1-dev rpm
      - uses: ./.github/actions/setup-build
        with:
          posthog-key: ${{ secrets.POSTHOG_PROJECT_API_KEY }}
          posthog-host: ${{ secrets.POSTHOG_HOST }}
          cn-mirror-base-url: ${{ vars.YODA_CN_MIRROR_PUBLIC_BASE_URL }}

      - run: pnpm run build

      - run: echo "NODE_OPTIONS=${NODE_OPTIONS:-not set}" && node --version

      - name: Build Linux packages
        run: >
          node --experimental-strip-types scripts/release/build.ts
          --platform linux --arch x64

      - name: Check R2 secrets
        id: r2
        shell: bash
        env:
          R2_KEY: ${{ secrets.R2_ACCESS_KEY_ID }}
        run: |
          if [ -n "$R2_KEY" ]; then
            echo "has_r2=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_r2=false" >> "$GITHUB_OUTPUT"
            echo "::warning::R2 secrets not configured. Skipping R2 upload."
          fi

      - name: Upload to R2
        if: ${{ steps.r2.outputs.has_r2 == 'true' }}
        uses: ./.github/actions/upload-r2
        with:
          r2-account-id: ${{ secrets.R2_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2-bucket: ${{ secrets.R2_BUCKET }}

      - name: Pin versioned URLs in update manifests
        shell: bash
        run: node --experimental-strip-types scripts/release/pin-feed-urls.ts

      - name: Check China mirror secrets
        id: cn-mirror
        shell: bash
        env:
          CN_ENDPOINT: ${{ vars.YODA_CN_MIRROR_ENDPOINT }}
          CN_PUBLIC_BASE_URL: ${{ vars.YODA_CN_MIRROR_PUBLIC_BASE_URL }}
          CN_ACCESS_KEY_ID: ${{ secrets.YODA_CN_MIRROR_ACCESS_KEY_ID }}
          CN_SECRET_ACCESS_KEY: ${{ secrets.YODA_CN_MIRROR_SECRET_ACCESS_KEY }}
        run: |
          if [ -n "$CN_ENDPOINT" ] && [ -n "$CN_PUBLIC_BASE_URL" ] && [ -n "$CN_ACCESS_KEY_ID" ] && [ -n "$CN_SECRET_ACCESS_KEY" ]; then
            echo "has_cn_mirror=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_cn_mirror=false" >> "$GITHUB_OUTPUT"
            echo "::warning::China mirror secrets or variables not configured. Skipping China mirror upload."
          fi

      - name: Upload to China mirror
        if: ${{ steps.cn-mirror.outputs.has_cn_mirror == 'true' }}
        uses: ./.github/actions/upload-cn-mirror
        with:
          endpoint: ${{ vars.YODA_CN_MIRROR_ENDPOINT }}
          access-key-id: ${{ secrets.YODA_CN_MIRROR_ACCESS_KEY_ID }}
          secret-access-key: ${{ secrets.YODA_CN_MIRROR_SECRET_ACCESS_KEY }}
          public-base-url: ${{ vars.YODA_CN_MIRROR_PUBLIC_BASE_URL }}
          region: ${{ vars.YODA_CN_MIRROR_REGION || 'auto' }}
          key-prefix: ${{ vars.YODA_CN_MIRROR_KEY_PREFIX }}

      - name: Upload to GitHub Release (draft)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          gh release upload "$RELEASE_TAG" -R "$GITHUB_REPOSITORY" --clobber \
            release/*.AppImage \
            release/*.AppImage.blockmap \
            release/*.deb \
            release/*.rpm \
            release/v1-stable-linux*.yml

  release-win:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    needs: create-release
    runs-on: windows-2022
    permissions:
      contents: write
    environment: release
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}
      - uses: ./.github/actions/setup-build
        with:
          posthog-key: ${{ secrets.POSTHOG_PROJECT_API_KEY }}
          posthog-host: ${{ secrets.POSTHOG_HOST }}
          windows-native: 'true'
          cn-mirror-base-url: ${{ vars.YODA_CN_MIRROR_PUBLIC_BASE_URL }}
      - name: Export Python path for native modules
        shell: bash
        run: echo "python=$(which python)" >> "$GITHUB_ENV"

      - name: Build app
        shell: bash
        run: pnpm run build

      - shell: bash
        run: echo "NODE_OPTIONS=${NODE_OPTIONS:-not set}" && node --version

      - name: Check Azure Trusted Signing secrets
        id: signing
        shell: bash
        env:
          AZ_TENANT: ${{ secrets.AZURE_TENANT_ID }}
          AZ_CLIENT: ${{ secrets.AZURE_CLIENT_ID }}
          AZ_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          if [ -n "$AZ_TENANT" ] && [ -n "$AZ_CLIENT" ] && [ -n "$AZ_SECRET" ]; then
            echo "has_signing=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_signing=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Azure Trusted Signing secrets not configured. Windows build will be unsigned."
          fi

      - name: Build Windows packages
        shell: bash
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          YODA_DISABLE_WIN_SIGNING: ${{ steps.signing.outputs.has_signing == 'true' && '0' || '1' }}
        run: >
          node --experimental-strip-types scripts/release/build.ts
          --platform win --arch x64

      - name: Verify Windows code signature
        if: ${{ steps.signing.outputs.has_signing == 'true' }}
        shell: bash
        run: node --experimental-strip-types scripts/release/verify-win.ts

      - name: Check R2 secrets
        id: r2
        shell: bash
        env:
          R2_KEY: ${{ secrets.R2_ACCESS_KEY_ID }}
        run: |
          if [ -n "$R2_KEY" ]; then
            echo "has_r2=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_r2=false" >> "$GITHUB_OUTPUT"
            echo "::warning::R2 secrets not configured. Skipping R2 upload."
          fi

      - name: Upload to R2
        if: ${{ steps.r2.outputs.has_r2 == 'true' }}
        uses: ./.github/actions/upload-r2
        with:
          r2-account-id: ${{ secrets.R2_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2-bucket: ${{ secrets.R2_BUCKET }}

      - name: Pin versioned URLs in update manifests
        shell: bash
        run: node --experimental-strip-types scripts/release/pin-feed-urls.ts

      - name: Check China mirror secrets
        id: cn-mirror
        shell: bash
        env:
          CN_ENDPOINT: ${{ vars.YODA_CN_MIRROR_ENDPOINT }}
          CN_PUBLIC_BASE_URL: ${{ vars.YODA_CN_MIRROR_PUBLIC_BASE_URL }}
          CN_ACCESS_KEY_ID: ${{ secrets.YODA_CN_MIRROR_ACCESS_KEY_ID }}
          CN_SECRET_ACCESS_KEY: ${{ secrets.YODA_CN_MIRROR_SECRET_ACCESS_KEY }}
        run: |
          if [ -n "$CN_ENDPOINT" ] && [ -n "$CN_PUBLIC_BASE_URL" ] && [ -n "$CN_ACCESS_KEY_ID" ] && [ -n "$CN_SECRET_ACCESS_KEY" ]; then
            echo "has_cn_mirror=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_cn_mirror=false" >> "$GITHUB_OUTPUT"
            echo "::warning::China mirror secrets or variables not configured. Skipping China mirror upload."
          fi

      - name: Upload to China mirror
        if: ${{ steps.cn-mirror.outputs.has_cn_mirror == 'true' }}
        uses: ./.github/actions/upload-cn-mirror
        with:
          endpoint: ${{ vars.YODA_CN_MIRROR_ENDPOINT }}
          access-key-id: ${{ secrets.YODA_CN_MIRROR_ACCESS_KEY_ID }}
          secret-access-key: ${{ secrets.YODA_CN_MIRROR_SECRET_ACCESS_KEY }}
          public-base-url: ${{ vars.YODA_CN_MIRROR_PUBLIC_BASE_URL }}
          region: ${{ vars.YODA_CN_MIRROR_REGION || 'auto' }}
          key-prefix: ${{ vars.YODA_CN_MIRROR_KEY_PREFIX }}

      - name: Upload to GitHub Release (draft)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          gh release upload "$RELEASE_TAG" -R "$GITHUB_REPOSITORY" --clobber \
            release/*.exe \
            release/*.exe.blockmap \
            release/*.msi \
            release/v1-stable*.yml

  release-mac:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    needs: create-release
    runs-on: macos-latest
    permissions:
      contents: write
    environment: release
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}
      - uses: ./.github/actions/setup-build
        with:
          posthog-key: ${{ secrets.POSTHOG_PROJECT_API_KEY }}
          posthog-host: ${{ secrets.POSTHOG_HOST }}
          cn-mirror-base-url: ${{ vars.YODA_CN_MIRROR_PUBLIC_BASE_URL }}

      - name: Check Apple signing secrets
        id: apple
        shell: bash
        env:
          APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_ID_VAL: ${{ secrets.APPLE_ID }}
          SPARKLE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          if [ -z "$APPLE_CERT" ]; then
            echo "::error::APPLE_CERTIFICATE is required for macOS delta updates."
            exit 1
          fi
          if [ -z "$SPARKLE_KEY" ]; then
            echo "::error::SPARKLE_ED_PRIVATE_KEY is required for macOS delta updates."
            exit 1
          fi
          echo "has_signing=true" >> "$GITHUB_OUTPUT"
          if [ -n "$APPLE_CERT" ] && [ -n "$APPLE_ID_VAL" ]; then
            echo "has_notarize=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_notarize=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Apple notarization secrets not fully configured. Skipping notarization."
          fi

      - name: Import Apple signing certificate
        if: ${{ steps.apple.outputs.has_signing == 'true' }}
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - run: pnpm run build

      - run: echo "NODE_OPTIONS=${NODE_OPTIONS:-not set}" && node --version

      - name: Build macOS DMGs + ZIPs
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ steps.apple.outputs.has_signing == 'true' && 'true' || 'false' }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          YODA_DISABLE_MAC_SIGNING: ${{ steps.apple.outputs.has_signing == 'true' && '0' || '1' }}
        run: >
          node --experimental-strip-types scripts/release/build.ts
          --platform mac --arch ${{ github.event.inputs.arch || 'both' }} --targets dmg,zip

      - name: Verify macOS bundle
        if: ${{ steps.apple.outputs.has_signing == 'true' }}
        run: >
          node --experimental-strip-types scripts/release/verify-mac.ts
          --expected-team-id ${{ secrets.APPLE_TEAM_ID }}

      - name: Prove delta-only Sparkle install
        run: pnpm run test:sparkle-delta

      - name: Notarize and staple
        if: ${{ steps.apple.outputs.has_notarize == 'true' }}
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: node --experimental-strip-types scripts/release/notarize-mac.ts --app-bundle "Yoda.app"

      - name: Refresh macOS DMG blockmaps and update metadata
        run: node --experimental-strip-types scripts/release/refresh-mac-update-metadata.ts

      - name: Generate signed Sparkle appcasts and deltas
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: >
          node --experimental-strip-types scripts/release/generate-sparkle-appcast.ts
          --variant stable

      - name: Check R2 secrets
        id: r2
        shell: bash
        env:
          R2_KEY: ${{ secrets.R2_ACCESS_KEY_ID }}
        run: |
          if [ -n "$R2_KEY" ]; then
            echo "has_r2=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_r2=false" >> "$GITHUB_OUTPUT"
            echo "::warning::R2 secrets not configured. Skipping R2 upload."
          fi

      - name: Upload to R2
        if: ${{ steps.r2.outputs.has_r2 == 'true' }}
        uses: ./.github/actions/upload-r2
        with:
          r2-account-id: ${{ secrets.R2_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2-bucket: ${{ secrets.R2_BUCKET }}

      - name: Pin versioned URLs in update manifests
        shell: bash
        run: node --experimental-strip-types scripts/release/pin-feed-urls.ts

      - name: Check China mirror secrets
        id: cn-mirror
        shell: bash
        env:
          CN_ENDPOINT: ${{ vars.YODA_CN_MIRROR_ENDPOINT }}
          CN_PUBLIC_BASE_URL: ${{ vars.YODA_CN_MIRROR_PUBLIC_BASE_URL }}
          CN_ACCESS_KEY_ID: ${{ secrets.YODA_CN_MIRROR_ACCESS_KEY_ID }}
          CN_SECRET_ACCESS_KEY: ${{ secrets.YODA_CN_MIRROR_SECRET_ACCESS_KEY }}
        run: |
          if [ -n "$CN_ENDPOINT" ] && [ -n "$CN_PUBLIC_BASE_URL" ] && [ -n "$CN_ACCESS_KEY_ID" ] && [ -n "$CN_SECRET_ACCESS_KEY" ]; then
            echo "has_cn_mirror=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_cn_mirror=false" >> "$GITHUB_OUTPUT"
            echo "::warning::China mirror secrets or variables not configured. Skipping China mirror upload."
          fi

      - name: Upload to China mirror
        if: ${{ steps.cn-mirror.outputs.has_cn_mirror == 'true' }}
        uses: ./.github/actions/upload-cn-mirror
        with:
          endpoint: ${{ vars.YODA_CN_MIRROR_ENDPOINT }}
          access-key-id: ${{ secrets.YODA_CN_MIRROR_ACCESS_KEY_ID }}
          secret-access-key: ${{ secrets.YODA_CN_MIRROR_SECRET_ACCESS_KEY }}
          public-base-url: ${{ vars.YODA_CN_MIRROR_PUBLIC_BASE_URL }}
          region: ${{ vars.YODA_CN_MIRROR_REGION || 'auto' }}
          key-prefix: ${{ vars.YODA_CN_MIRROR_KEY_PREFIX }}

      - name: Upload to GitHub Release (draft)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          gh release upload "$RELEASE_TAG" -R "$GITHUB_REPOSITORY" --clobber \
            release/*.dmg \
            release/*.dmg.blockmap \
            release/*.zip \
            release/*.zip.blockmap \
            release/*.delta \
            release/appcast-*.xml \
            release/v1-stable-mac*.yml

      - name: Cleanup keychain
        if: ${{ always() && steps.apple.outputs.has_signing == 'true' }}
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true

  # 三个平台全部传完后才发布，保证 latest/download 一翻转就是完整资产。
  publish-release:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    needs: [create-release, release-linux, release-win, release-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release edit "$RELEASE_TAG" -R "$GITHUB_REPOSITORY" --draft=false --latest
